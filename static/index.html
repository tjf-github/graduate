<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudisk 云盘系统</title>
    <style>
        /* 基础样式布局 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1,
        h2 {
            text-align: center;
            color: #007bff;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        /* 按钮样式 */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
            margin-top: 10px;
        }

        /* 功能区域切换 */
        .hidden {
            display: none;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: #007bff;
            cursor: pointer;
            margin-left: 20px;
        }

        .profile-card {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 18px;
        }

        .profile-item {
            font-size: 14px;
            color: #555;
        }

        .profile-item b {
            color: #212529;
        }

        .storage-wrap {
            grid-column: 1 / -1;
        }

        .storage-bar {
            width: 100%;
            height: 10px;
            background: #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 6px;
        }

        .storage-fill {
            height: 100%;
            background: #28a745;
            width: 0%;
            transition: width 0.3s;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
        }

        /* 消息提示 */
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <div class="container" id="auth-section">
        <h1>Cloudisk 云盘</h1>

        <div id="login-form">
            <h2>用户登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="login-password" placeholder="请输入密码">
            </div>
            <button onclick="handleLogin()">登录</button>
            <button class="btn-secondary" onclick="toggleAuth(false)">没有账号？前往注册</button>
        </div>

        <div id="register-form" class="hidden">
            <h2>用户注册</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="reg-username" placeholder="请设置用户名">
            </div>
            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" id="reg-email" placeholder="user@example.com (仅作信息存储)">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="reg-password" placeholder="请设置密码">
            </div>
            <button onclick="handleRegister()">立即注册</button>
            <button class="btn-secondary" onclick="toggleAuth(true)">已有账号？返回登录</button>
        </div>

        <div id="message" class="hidden"></div>
    </div>

    <div class="container hidden" id="disk-section">
        <div class="nav">
            <span>欢迎回来, <b id="display-user"></b></span>
            <div class="nav-links">
                <a onclick="handleLogout()">安全退出</a>
            </div>
        </div>

        <h2>我的云端文件</h2>
        <div class="profile-card">
            <div class="profile-item">用户ID：<b id="profile-id">-</b></div>
            <div class="profile-item">用户名：<b id="profile-username">-</b></div>
            <div class="profile-item">邮箱：<b id="profile-email">-</b></div>
            <div class="profile-item">注册时间：<b id="profile-created">-</b></div>
            <div class="profile-item">会话数：<b id="profile-sessions">-</b></div>
            <div class="profile-item">超时策略：<b id="profile-timeout">-</b></div>
            <div class="storage-wrap profile-item">存储使用：<b id="profile-storage">-</b>
                <div class="storage-bar">
                    <div class="storage-fill" id="profile-storage-fill"></div>
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="file" id="file-selector" style="flex: 1;">
            <button onclick="handleUpload()" style="width: auto; padding: 0 20px;">上传文件</button>
            <button onclick="loadFileList()" style="width: auto; background-color: #28a745;">刷新</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>文件名</th>
                    <th>大小</th>
                    <th>上传时间</th>
                    <th>管理操作</th>
                </tr>
            </thead>
            <tbody id="file-table-body">
                <tr>
                    <td colspan="4" style="text-align:center;">正在加载文件列表...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE = '/api';
        let currentToken = localStorage.getItem('cloudisk_token') || '';
        let currentUser = localStorage.getItem('cloudisk_user') || '';

        // 页面初始化：检查本地是否有残留 Token
        window.onload = () => {
            if (currentToken && currentUser) {
                document.getElementById('display-user').textContent = currentUser;
                showDiskSection();
                loadUserProfile();
                loadFileList();
            } else {
                localStorage.removeItem('cloudisk_token');
                localStorage.removeItem('cloudisk_user');
            }
        };

        // UI 切换逻辑
        function toggleAuth(showLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !showLogin);
            document.getElementById('register-form').classList.toggle('hidden', showLogin);
        }

        function showDiskSection() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('disk-section').classList.remove('hidden');
        }

        function showMsg(text, isError = false) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = isError ? 'error' : 'success';
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // --- 核心 API 调用逻辑 ---

        // 1. 注册 (包含 Email)
        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            if (!username || !email || !password) return showMsg('请填写所有字段', true);

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (data.code === 200) {
                    showMsg('注册成功！正在返回登录...');
                    setTimeout(() => toggleAuth(true), 1500);
                } else {
                    showMsg(data.message || '注册失败', true);
                }
            } catch (e) { showMsg('网络请求失败', true); }
        }

        // 2. 登录
        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.code === 200) {
                    currentToken = data.data.token;
                    localStorage.setItem('cloudisk_token', currentToken);
                    localStorage.setItem('cloudisk_user', username);
                    document.getElementById('display-user').textContent = username;
                    showDiskSection();
                    loadUserProfile();
                    loadFileList();
                } else {
                    showMsg(data.message || '登录失败', true);
                }
            } catch (e) { showMsg('连接服务器失败', true); }
        }

        function formatBytes(bytes) {
            if (!Number.isFinite(bytes) || bytes < 0) return '-';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let value = bytes;
            let idx = 0;
            while (value >= 1024 && idx < units.length - 1) {
                value /= 1024;
                idx++;
            }
            return `${value.toFixed(2)} ${units[idx]}`;
        }

        async function loadUserProfile() {
            try {
                const res = await fetch(`${API_BASE}/user/info`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                if (data.code !== 200 || !data.data) return;

                const p = data.data;
                document.getElementById('profile-id').textContent = p.id ?? '-';
                document.getElementById('profile-username').textContent = p.username || currentUser || '-';
                document.getElementById('profile-email').textContent = p.email || '-';
                document.getElementById('profile-created').textContent = p.created_at || '-';
                document.getElementById('profile-sessions').textContent = p.active_sessions ?? '-';
                document.getElementById('profile-timeout').textContent = p.timeout_minutes ? `${p.timeout_minutes} 分钟` : '-';

                const used = Number(p.storage_used || 0);
                const limit = Number(p.storage_limit || 0);
                document.getElementById('profile-storage').textContent = `${formatBytes(used)} / ${formatBytes(limit)}`;

                let percent = 0;
                if (limit > 0) percent = Math.min(100, Math.round((used / limit) * 100));
                const fill = document.getElementById('profile-storage-fill');
                fill.style.width = `${percent}%`;
                fill.style.background = percent > 90 ? '#dc3545' : percent > 75 ? '#ffc107' : '#28a745';
            } catch (e) {
                console.error('用户资料加载失败', e);
            }
        }

        // 3. 获取文件列表
        async function loadFileList() {
            try {
                const res = await fetch(`${API_BASE}/file/list`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                const tbody = document.getElementById('file-table-body');
                tbody.innerHTML = '';

                if (data.code === 200 && data.data) {
                    const files = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
                    if (files.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">您的云端空空如也</td></tr>';
                        return;
                    }
                    files.forEach(f => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${f.original_filename || f.filename}</td>
                            <td>${(f.size / 1024).toFixed(2)} KB</td>
                            <td>${f.upload_date}</td>
                            <td>
                                <button onclick="downloadFile(${f.id}, '${f.original_filename}')" style="width:auto; padding:5px 10px; background:#28a745">下载</button>
                                <button onclick="deleteFile(${f.id})" style="width:auto; padding:5px 10px; background:#dc3545">删除</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (e) { console.error("列表加载失败", e); }
        }

        // 4. 上传文件 (使用二进制流)
        async function handleUpload() {
            const fileInput = document.getElementById('file-selector');
            if (fileInput.files.length === 0) return alert('请先选择文件');
            const file = fileInput.files[0];

            try {
                const res = await fetch(`${API_BASE}/file/upload`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'X-Filename': encodeURIComponent(file.name)
                    },
                    body: file
                });
                const data = await res.json();
                if (data.code === 200) {
                    showMsg('文件上传成功');
                    loadUserProfile();
                    loadFileList();
                } else { showMsg('上传失败', true); }
            } catch (e) { showMsg('上传过程中出错', true); }
        }

        // 5. 下载文件 (Blob 处理)
        async function downloadFile(id, name) {
            try {
                const res = await fetch(`${API_BASE}/file/download?id=${id}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (e) { alert('下载失败'); }
        }

        // 6. 删除文件
        async function deleteFile(id) {
            if (!confirm('确定要永久删除此文件吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/file/delete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}` },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.code === 200) {
                    showMsg('文件已删除');
                    loadUserProfile();
                    loadFileList();
                }
            } catch (e) { alert('操作失败'); }
        }

        function handleLogout() {
            localStorage.removeItem('cloudisk_token');
            localStorage.removeItem('cloudisk_user');
            location.reload();
        }
    </script>
</body>

</html>
