<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量级网络通信服务器 — 功能演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 960px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1,
        h2 {
            text-align: center;
            color: #007bff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: #007bff;
            cursor: pointer;
            margin-left: 20px;
        }

        .profile-card {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 18px;
        }

        .profile-item {
            font-size: 14px;
            color: #555;
        }

        .profile-item b {
            color: #212529;
        }

        .storage-wrap {
            grid-column: 1 / -1;
        }

        .storage-bar {
            width: 100%;
            height: 10px;
            background: #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 6px;
        }

        .storage-fill {
            height: 100%;
            background: #28a745;
            width: 0%;
            transition: width 0.3s;
        }

        .profile-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .small-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
        }

        .inline-share {
            display: flex;
            gap: 10px;
            margin: 12px 0 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
        }

        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .notify {
            position: fixed;
            right: 20px;
            top: 20px;
            z-index: 9999;
            min-width: 260px;
            max-width: 420px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, .2);
        }

        .message-panel {
            margin-top: 28px;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 18px;
            background: #fafbfc;
        }

        .message-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

        .message-toolbar input {
            flex: 1;
        }

        .message-list {
            min-height: 220px;
            max-height: 360px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
            padding: 12px;
            margin-bottom: 12px;
        }

        .message-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #eef4ff;
        }

        .message-item.self {
            background: #dff7e8;
        }

        .message-meta {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 6px;
        }

        .message-content {
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        .message-compose {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-compose textarea {
            flex: 1;
            min-height: 84px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            resize: vertical;
            font: inherit;
        }

        .message-empty {
            color: #6c757d;
            text-align: center;
            padding: 40px 10px;
        }

        .mt-10 {
            margin-top: 10px;
        }

        .flex-row {
            display: flex;
        }

        .gap-10 {
            gap: 10px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        .flex-1 {
            flex: 1;
        }

        .btn-auto {
            width: auto;
        }

        .btn-gray {
            background-color: #6c757d;
        }

        .btn-green {
            background-color: #28a745;
        }

        .btn-teal {
            background-color: #17a2b8;
        }

        .btn-purple {
            background-color: #6f42c1;
        }

        .btn-orange {
            background-color: #fd7e14;
        }

        .btn-red {
            background-color: #dc3545;
        }

        .btn-pad-x {
            padding: 0 20px;
        }

        .btn-action {
            width: auto;
            padding: 5px 10px;
        }

        .btn-inline-spaced {
            margin-left: 6px;
        }

        .btn-send {
            width: 140px;
        }

        .status-text {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 10px;
        }

        .table-empty {
            text-align: center;
        }
.server-status-card {
  border: 1px solid #bee3f8;
  background: #ebf8ff;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 22px;
}
.status-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
  margin-bottom: 10px;
  color: #2b6cb0;
}
.status-body {
  font-size: 13px;
  color: #2d3748;
  line-height: 1.8;
}
    </style>
</head>

<body>
    <div class="container" id="auth-section">
        <h1>轻量级通信服务器</h1>
        <div id="login-form">
            <h2>用户登录</h2>
            <div class="form-group"><label>用户名</label><input type="text" id="login-username" placeholder="请输入用户名"></div>
            <div class="form-group"><label>密码</label><input type="password" id="login-password" placeholder="请输入密码">
            </div>
            <button onclick="handleLogin()">登录</button>
            <button class="btn-secondary" onclick="toggleAuth(false)">没有账号？前往注册</button>
        </div>

        <div id="register-form" class="hidden">
            <h2>用户注册</h2>
            <div class="form-group"><label>用户名</label><input type="text" id="reg-username" placeholder="请设置用户名"></div>
            <div class="form-group"><label>电子邮箱</label><input type="email" id="reg-email"
                    placeholder="user@example.com"></div>
            <div class="form-group"><label>密码</label><input type="password" id="reg-password" placeholder="请设置密码"></div>
            <button onclick="handleRegister()">立即注册</button>
            <button class="btn-secondary" onclick="toggleAuth(true)">已有账号？返回登录</button>
        </div>
        <div id="message" class="hidden notify"></div>
    </div>

    <div class="container hidden" id="disk-section">
        <div class="nav">
            <span>欢迎回来, <b id="display-user"></b></span>
            <div class="nav-links"><a onclick="handleLogout()">安全退出</a></div>
        </div>

        <div class="server-status-card" id="server-status-card">
            <div class="status-header">
                <span>🖥 服务器运行状态</span>
                <button class="btn-auto small-btn" onclick="loadServerStatus()">刷新</button>
            </div>
            <div id="server-status-body" class="status-body">正在获取...</div>
        </div>

        <h2>文件传输</h2>
        <div class="profile-card">
            <div class="profile-item">用户ID：<b id="profile-id">-</b></div>
            <div class="profile-item">用户名：<b id="profile-username">-</b></div>
            <div class="profile-item">邮箱：<b id="profile-email">-</b></div>
            <div class="profile-item">注册时间：<b id="profile-created">-</b></div>
            <div class="profile-item">会话数：<b id="profile-sessions">-</b></div>
            <div class="profile-item">超时策略：<b id="profile-timeout">-</b></div>
            <div class="storage-wrap profile-item">存储使用：<b id="profile-storage">-</b>
                <div class="storage-bar">
                    <div class="storage-fill" id="profile-storage-fill"></div>
                </div>
                <div class="profile-actions">
                    <button class="small-btn" onclick="toggleProfileEditor(true)">修改用户名/邮箱</button>
                </div>
                <div id="profile-editor" class="hidden mt-10">
                    <div class="flex-row gap-10">
                        <input id="edit-username" type="text" placeholder="新用户名">
                        <input id="edit-email" type="email" placeholder="新邮箱">
                        <button class="small-btn" onclick="submitProfileUpdate()">保存</button>
                        <button class="small-btn btn-gray"
                            onclick="toggleProfileEditor(false)">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="inline-share">
            <input id="share-link-input" type="text" placeholder="粘贴分享链接，例如 /api/share/download?code=XXXX">
            <button class="btn-auto" onclick="downloadByShareLink()">下载分享文件</button>
        </div>

        <div class="flex-row gap-10 mb-20">
            <input type="file" id="file-selector" class="flex-1">
            <button class="btn-auto btn-pad-x" onclick="handleUpload()">上传文件</button>
            <button class="btn-auto btn-green" onclick="loadFileList()">刷新</button>
        </div>

        <div class="flex-row gap-10 mb-20">
            <input id="file-search-input" type="text" placeholder="按文件名搜索，例如 report 或 .pdf" class="flex-1">
            <button class="btn-auto btn-teal" onclick="searchFiles()">搜索</button>
            <button class="btn-auto btn-gray" onclick="resetFileSearch()">清空搜索</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>文件名</th>
                    <th>大小</th>
                    <th>上传时间</th>
                    <th>管理操作</th>
                </tr>
            </thead>
            <tbody id="file-table-body">
                <tr>
                    <td colspan="4" class="table-empty">正在加载文件列表...</td>
                </tr>
            </tbody>
        </table>

        <div class="message-panel">
            <h2>消息通信（短轮询演示）</h2>
            <div class="message-toolbar">
                <input id="chat-user-id" type="number" min="1" placeholder="输入对方用户 ID">
                <button class="btn-auto" onclick="selectChatUser()">进入会话</button>
                <button class="btn-auto btn-green" onclick="loadMessages(true)">刷新消息</button>
            </div>
            <div id="message-status" class="status-text">请选择一个用户开始聊天</div>
            <div id="message-list" class="message-list">
                <div class="message-empty">暂无会话内容</div>
            </div>
            <div class="message-compose">
                <textarea id="message-input" placeholder="输入消息内容（服务器每 3 秒推送最新消息）"></textarea>
                <button class="btn-send" onclick="sendMessage()">发送消息</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentToken = localStorage.getItem('lwcs_token') || '';
        let currentUser = localStorage.getItem('lwcs_user') || '';
        let currentUserId = Number(localStorage.getItem('lwcs_user_id') || 0);
        let activeChatUserId = Number(localStorage.getItem('lwcs_chat_user_id') || 0);
        let messagePollTimer = null;

        window.onload = () => {
            if (currentToken && currentUser) {
                document.getElementById('display-user').textContent = currentUser;
                showDiskSection();
                loadUserProfile();
                loadFileList();
                restoreChatState();
            } else {
                localStorage.removeItem('lwcs_token');
                localStorage.removeItem('lwcs_user');
                localStorage.removeItem('lwcs_user_id');
                localStorage.removeItem('lwcs_chat_user_id');
            }
        };

        function toggleAuth(showLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !showLogin);
            document.getElementById('register-form').classList.toggle('hidden', showLogin);
        }
        function showDiskSection() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('disk-section').classList.remove('hidden');
    loadServerStatus();
        }
        function showAuthSection() {
            document.getElementById('disk-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
        }
        function showMsg(text, isError = false) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `notify ${isError ? 'error' : 'success'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        function clearAuthState() {
            stopMessagePolling();
            currentToken = '';
            currentUser = '';
            currentUserId = 0;
            activeChatUserId = 0;
            localStorage.removeItem('lwcs_token');
            localStorage.removeItem('lwcs_user');
            localStorage.removeItem('lwcs_user_id');
            localStorage.removeItem('lwcs_chat_user_id');
        }
        function handleUnauthorized(message = '登录已失效，请重新登录') {
            clearAuthState();
            showAuthSection();
            toggleAuth(true);
            showMsg(message, true);
        }
        function formatBytes(bytes) {
            if (!Number.isFinite(bytes) || bytes < 0) return '-';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let v = bytes, i = 0;
            while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
            return `${v.toFixed(2)} ${units[i]}`;
        }
        function toggleProfileEditor(show) {
            const editor = document.getElementById('profile-editor');
            editor.classList.toggle('hidden', !show);
            if (show) {
                document.getElementById('edit-username').value = document.getElementById('profile-username').textContent || '';
                document.getElementById('edit-email').value = document.getElementById('profile-email').textContent || '';
            }
        }

        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            if (!username || !email || !password) return showMsg('请填写所有字段', true);
            try {
                const res = await fetch(`${API_BASE}/register`, { method: 'POST', body: JSON.stringify({ username, email, password }) });
                const data = await res.json();
                if (data.code === 200) { showMsg('注册成功！正在返回登录...'); setTimeout(() => toggleAuth(true), 1200); }
                else showMsg(data.message || '注册失败', true);
            } catch (_) { showMsg('网络请求失败', true); }
        }

        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_BASE}/login`, { method: 'POST', body: JSON.stringify({ username, password }) });
                const data = await res.json();
                if (data.code === 200) {
                    currentToken = data.data.token;
                    currentUser = username;
                    currentUserId = Number(data.data.id || 0);
                    localStorage.setItem('lwcs_token', currentToken);
                    localStorage.setItem('lwcs_user', username);
                    localStorage.setItem('lwcs_user_id', String(currentUserId || 0));
                    document.getElementById('display-user').textContent = username;
                    showDiskSection();
                    loadUserProfile();
                    loadFileList();
                    restoreChatState();
                } else showMsg(data.message || '登录失败', true);
            } catch (_) { showMsg('连接服务器失败', true); }
        }

        async function loadUserProfile() {
            try {
                const res = await fetch(`${API_BASE}/user/info`, { headers: { 'Authorization': `Bearer ${currentToken}` } });
                const data = await res.json();
                if (data.code !== 200 || !data.data) return;
                const p = data.data;
                currentUserId = Number(p.id || 0);
                localStorage.setItem('lwcs_user_id', String(currentUserId || 0));
                document.getElementById('profile-id').textContent = p.id ?? '-';
                document.getElementById('profile-username').textContent = p.username || currentUser || '-';
                document.getElementById('profile-email').textContent = p.email || '-';
                document.getElementById('profile-created').textContent = p.created_at || '-';
                document.getElementById('profile-sessions').textContent = p.active_sessions ?? '-';
                document.getElementById('profile-timeout').textContent = p.timeout_minutes ? `${p.timeout_minutes} 分钟` : '-';
                const used = Number(p.storage_used || 0), limit = Number(p.storage_limit || 0);
                document.getElementById('profile-storage').textContent = `${formatBytes(used)} / ${formatBytes(limit)}`;
                const percent = limit > 0 ? Math.min(100, Math.round((used / limit) * 100)) : 0;
                const fill = document.getElementById('profile-storage-fill');
                fill.style.width = `${percent}%`;
                fill.style.background = percent > 90 ? '#dc3545' : percent > 75 ? '#ffc107' : '#28a745';
            } catch (e) { console.error('用户资料加载失败', e); }
        }

        function restoreChatState() {
            if (activeChatUserId > 0) {
                document.getElementById('chat-user-id').value = activeChatUserId;
                updateMessageStatus(`当前会话用户 ID：${activeChatUserId}`);
                startMessagePolling();
                loadMessages();
            }
        }

        function updateMessageStatus(text) {
            document.getElementById('message-status').textContent = text;
        }

        function renderFileRows(files, isSearchResult = false) {
            const tbody = document.getElementById('file-table-body');
            tbody.innerHTML = '';
            if (!Array.isArray(files) || files.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="table-empty">${isSearchResult ? '没有匹配的文件' : '您的暂无文件'}</td></tr>`;
                return;
            }

            files.forEach(f => {
                const displayName = f.original_filename || f.filename || 'file';
                const sizeLabel = Number.isFinite(Number(f.size)) ? `${(Number(f.size) / 1024).toFixed(2)} KB` : '-';
                const uploadDate = f.upload_date || '-';
                const tr = document.createElement('tr');
                const nameTd = document.createElement('td');
                const sizeTd = document.createElement('td');
                const dateTd = document.createElement('td');
                const actionTd = document.createElement('td');

                nameTd.textContent = displayName;
                sizeTd.textContent = sizeLabel;
                dateTd.textContent = uploadDate;

                const downloadBtn = document.createElement('button');
                downloadBtn.textContent = '下载';
                downloadBtn.className = 'btn-action btn-green';
                downloadBtn.onclick = () => downloadFile(f.id, displayName);

                const renameBtn = document.createElement('button');
                renameBtn.textContent = '重命名';
                renameBtn.className = 'btn-action btn-orange btn-inline-spaced';
                renameBtn.onclick = () => renameFile(f.id, displayName);

                const shareBtn = document.createElement('button');
                shareBtn.textContent = '分享';
                shareBtn.className = 'btn-action btn-purple btn-inline-spaced';
                shareBtn.onclick = () => createShare(f.id);

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '删除';
                deleteBtn.className = 'btn-action btn-red btn-inline-spaced';
                deleteBtn.onclick = () => deleteFile(f.id);

                actionTd.appendChild(downloadBtn);
                actionTd.appendChild(renameBtn);
                actionTd.appendChild(shareBtn);
                actionTd.appendChild(deleteBtn);

                tr.appendChild(nameTd);
                tr.appendChild(sizeTd);
                tr.appendChild(dateTd);
                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

        function stopMessagePolling() {
            if (messagePollTimer) {
                clearInterval(messagePollTimer);
                messagePollTimer = null;
            }
        }

        function startMessagePolling() {
            stopMessagePolling();
            if (!activeChatUserId || !currentToken) return;
            messagePollTimer = setInterval(() => {
                loadMessages();
            }, 3000);
        }

        function selectChatUser() {
            const value = Number(document.getElementById('chat-user-id').value);
            if (!Number.isInteger(value) || value <= 0) {
                showMsg('请输入有效的用户 ID', true);
                return;
            }
            if (currentUserId > 0 && value === currentUserId) {
                showMsg('不能给自己发消息', true);
                return;
            }
            activeChatUserId = value;
            localStorage.setItem('lwcs_chat_user_id', String(activeChatUserId));
            updateMessageStatus(`当前会话用户 ID：${activeChatUserId}，每 3 秒自动刷新`);
            loadMessages(true);
            startMessagePolling();
        }

        function renderMessages(messages) {
            const list = document.getElementById('message-list');
            list.innerHTML = '';
            if (!Array.isArray(messages) || messages.length === 0) {
                list.innerHTML = '<div class="message-empty">当前会话还没有消息</div>';
                return;
            }

            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = `message-item ${Number(msg.sender_id) === currentUserId ? 'self' : ''}`;
                const statusText = Number(msg.sender_id) === currentUserId
                    ? (msg.is_read ? '对方已读' : '对方未读')
                    : (msg.is_read ? '已读' : '未读');
                item.innerHTML = `
                    <div class="message-meta">发送方：${msg.sender_id} | 接收方：${msg.receiver_id} | ${msg.created_at || '-'} | ${statusText}</div>
                    <div class="message-content"></div>
                `;
                item.querySelector('.message-content').textContent = msg.content || '';
                list.appendChild(item);
            });
            list.scrollTop = list.scrollHeight;
        }

        async function loadMessages(showErrors = false) {
            if (!activeChatUserId || !currentToken) return;
            try {
                const res = await fetch(`${API_BASE}/message/list?with_user_id=${activeChatUserId}&limit=50`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                if (res.status === 401 || data.code === 401) {
                    handleUnauthorized();
                    return;
                }
                if (data.code === 200) {
                    const messages = Array.isArray(data.data) ? [...data.data].reverse() : [];
                    renderMessages(messages);
                    updateMessageStatus(`当前会话用户 ID：${activeChatUserId}，共 ${messages.length} 条消息，每 3 秒自动刷新`);
                } else if (showErrors) {
                    showMsg(data.message || '消息加载失败', true);
                }
            } catch (_) {
                if (showErrors) showMsg('消息加载失败', true);
            }
        }

        async function sendMessage() {
            if (!activeChatUserId) {
                showMsg('请先输入聊天对象用户 ID', true);
                return;
            }
            const content = document.getElementById('message-input').value.trim();
            if (!content) {
                showMsg('消息内容不能为空', true);
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/message/send`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ receiver_id: activeChatUserId, content })
                });
                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('message-input').value = '';
                    showMsg('消息发送成功');
                    loadMessages();
                } else {
                    showMsg(data.message || '消息发送失败', true);
                }
            } catch (_) {
                showMsg('消息发送失败', true);
            }
        }

        async function submitProfileUpdate() {
            const username = document.getElementById('edit-username').value.trim();
            const email = document.getElementById('edit-email').value.trim();
            if (!username || !email) return showMsg('用户名和邮箱不能为空', true);
            try {
                const res = await fetch(`${API_BASE}/user/profile`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                const data = await res.json();
                if (data.code === 200) {
                    currentUser = username;
                    localStorage.setItem('lwcs_user', username);
                    document.getElementById('display-user').textContent = username;
                    showMsg('资料更新成功');
                    toggleProfileEditor(false);
                    loadUserProfile();
                } else showMsg(data.message || '资料更新失败', true);
            } catch (_) { showMsg('资料更新请求失败', true); }
        }

        async function loadFileList() {
            try {
                const res = await fetch(`${API_BASE}/file/list`, { headers: { 'Authorization': `Bearer ${currentToken}` } });
                const data = await res.json();
                if (res.status === 401 || data.code === 401) {
                    handleUnauthorized();
                    return;
                }
                if (data.code === 200 && data.data) {
                    const files = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
                    renderFileRows(files, false);
                }
            } catch (e) { console.error('列表加载失败', e); }
        }

        async function searchFiles() {
            const keyword = document.getElementById('file-search-input').value.trim();
            if (!keyword) {
                showMsg('请输入要搜索的文件名关键字', true);
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/file/search?keyword=${encodeURIComponent(keyword)}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                if (res.status === 401 || data.code === 401) {
                    handleUnauthorized();
                    return;
                }
                if (data.code === 200) {
                    const files = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
                    renderFileRows(files, true);
                    showMsg(`搜索完成，共找到 ${Array.isArray(files) ? files.length : 0} 个文件`);
                } else {
                    showMsg(data.message || '搜索失败', true);
                }
            } catch (_) {
                showMsg('搜索请求失败', true);
            }
        }

        function resetFileSearch() {
            document.getElementById('file-search-input').value = '';
            loadFileList();
        }

        async function handleUpload() {
            const fileInput = document.getElementById('file-selector');
            if (fileInput.files.length === 0) return alert('请先选择文件');
            const file = fileInput.files[0];
            try {
                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${API_BASE}/file/upload`);
                    xhr.setRequestHeader('Authorization', `Bearer ${currentToken}`);
                    xhr.setRequestHeader('X-Filename', encodeURIComponent(file.name));
                    xhr.upload.onprogress = (evt) => {
                        if (evt.lengthComputable) showMsg(`上传进度 ${Math.round((evt.loaded / evt.total) * 100)}%`);
                    };
                    xhr.onload = () => {
                        try {
                            const data = JSON.parse(xhr.responseText || '{}');
                            if (data.code === 200) {
                                showMsg('文件上传成功');
                                loadUserProfile();
                                loadFileList();
                                resolve();
                            } else {
                                showMsg(data.message || '上传失败', true);
                                reject(new Error('upload failed'));
                            }
                        } catch (e) { showMsg('上传响应解析失败', true); reject(e); }
                    };
                    xhr.onerror = () => { showMsg('上传过程中出错', true); reject(new Error('network')); };
                    xhr.send(file);
                });
            } catch (_) { }
        }

        async function downloadFile(id, name) {
            try {
                const res = await fetch(`${API_BASE}/file/download?id=${id}`, { headers: { 'Authorization': `Bearer ${currentToken}` } });
                if (!res.ok) {
                    let errorMessage = '下载失败';
                    try {
                        const err = await res.json();
                        if (res.status === 401 || err.code === 401) {
                            handleUnauthorized();
                            return;
                        }
                        errorMessage = err.message || errorMessage;
                    } catch (_) {
                        const errText = await res.text();
                        errorMessage = errText || errorMessage;
                    }
                    showMsg(errorMessage, true);
                    return;
                }
                const blob = await res.blob();
                showMsg('下载完成 100%');
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (_) { showMsg('下载失败', true); }
        }

        async function createShare(fileId) {
            try {
                const res = await fetch(`${API_BASE}/share/create`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: fileId })
                });
                const data = await res.json();
                if (data.code === 200 && data.data) {
                    const shareUrl = data.data.share_url;
                    const fullUrl = `${window.location.origin}${shareUrl}`;

                    // 1. 先把链接显示在输入框里（不依赖任何外部 API，不会失败）
                    document.getElementById('share-link-input').value = fullUrl;

                    // 2. 再单独尝试写剪贴板，失败了只影响提示语，不影响主功能
                    try {
                        await navigator.clipboard.writeText(fullUrl);
                        showMsg('分享链接已生成，已复制到剪贴板');
                    } catch (_) {
                        showMsg('分享链接已生成，请手动复制上方链接');
                    }
                } else {
                    showMsg(data.message || '分享失败', true);
                }
            } catch (_) { showMsg('分享请求失败', true); }
        }

        async function downloadByShareLink() {
            const raw = document.getElementById('share-link-input').value.trim();
            if (!raw) return showMsg('请先输入分享链接', true);
            let path = raw;
            if (raw.startsWith('http')) {
                try { const u = new URL(raw); path = u.pathname + u.search; } catch (_) { }
            }
            try {
                const res = await fetch(path);
                if (!res.ok) {
                    const err = await res.text();
                    showMsg(err || '分享下载失败', true);
                    return;
                }
                const blob = await res.blob();
                const disposition = res.headers.get('Content-Disposition') || '';
                const m = disposition.match(/filename="([^"]+)"/);
                const name = m ? m[1] : 'shared_file';
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                showMsg('分享文件下载成功');
            } catch (_) { showMsg('分享下载失败', true); }
        }

        async function deleteFile(id) {
            if (!confirm('确定要永久删除此文件吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/file/delete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}` },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.code === 200) {
                    showMsg('文件已删除');
                    loadUserProfile();
                    loadFileList();
                }
            } catch (_) { showMsg('操作失败', true); }
        }

        async function renameFile(id, oldName) {
            const newName = prompt('请输入新的文件名', oldName || '');
            if (newName === null) return;
            const finalName = newName.trim();
            if (!finalName) {
                showMsg('文件名不能为空', true);
                return;
            }
            if (finalName === oldName) {
                showMsg('文件名未发生变化');
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/file/rename`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, new_name: finalName })
                });
                const data = await res.json();
                if (data.code === 200) {
                    showMsg('文件重命名成功');
                    const keyword = document.getElementById('file-search-input').value.trim();
                    if (keyword) searchFiles();
                    else loadFileList();
                } else {
                    showMsg(data.message || '文件重命名失败', true);
                }
            } catch (_) {
                showMsg('文件重命名失败', true);
            }
        }

        async function handleLogout() {
            stopMessagePolling();
            try {
                if (currentToken) {
                    await fetch(`${API_BASE}/logout`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${currentToken}` }
                    });
                }
            } catch (_) { }
            clearAuthState();
            location.reload();
        }
    
async function loadServerStatus() {
  try {
    const res = await fetch(`${API_BASE}/server/status`, {
      headers: { 'Authorization': `Bearer ${currentToken}` }
    });
    const data = await res.json();
    const body = document.getElementById('server-status-body');
    if (data.code === 200) {
      let d = data.data;
      if (typeof d === 'string') {
        d = JSON.parse(d);
      }
      const rows = [
        `活跃连接数：<b>${d.active_connections ?? '-'}</b>`,
        `当前连接列表：${
          Array.isArray(d.clients) && d.clients.length > 0
            ? d.clients.map(c =>
                `<span style="margin-right:12px;">${c.ip}（fd=${c.socket_fd}）</span>`
              ).join('')
            : '无'
        }`
      ];
      body.innerHTML = rows.join('<br>');
    } else {
      body.textContent = '状态获取失败';
    }
  } catch (err) {
    document.getElementById('server-status-body').textContent = '无法连接服务器';
  }
}
</script>
