services:
  mysql:
    image: mysql:8.0
    container_name: cloudisk_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      MYSQL_DATABASE: ${DB_NAME:-cloudisk}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATE_SERVER: utf8mb4_unicode_ci
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cloudisk_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  lightweight_comm_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lightweight_comm_server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      STORAGE_PATH: /app/storage
      STATIC_DIR: /app/static
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-cloudisk}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - storage_data:/app/storage
    networks:
      - cloudisk_network

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local

networks:
  cloudisk_network:
    driver: bridge
